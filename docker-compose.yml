services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PORT=3001
      - DB_PATH=/app/data/blog.db
    volumes:
      - blog-data:/app/data
      - blog-uploads:/app/uploads
    networks:
      - app-network
    restart: unless-stopped

volumes:
  blog-data:
    name: cetakkartu-blog-data
  blog-uploads:
    name: cetakkartu-blog-uploads

networks:
  app-network:
    name: cetakkartu-network
    driver: bridge
